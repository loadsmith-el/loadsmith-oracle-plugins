# loadsmith-lab manifest for the out-of-canon Oracle (ODPI-C) connector.
#
# Register this directory as an origin to run the cases:
#   loadsmith-lab origin local add oracle-lab ../loadsmith-oracle-plugins/lab
# The cases reference the Oracle DB fixture as `images/lab-oracle`, which lives
# in the canonical `images` origin (loadsmith-lab-canonical-images) — a
# cross-origin reference. Register that too:
#   loadsmith-lab origin local add images ../loadsmith-lab-canonical-images
#
# The connector needs the Instant Client, so the cases run the core from the
# delivery image (which bakes it in). Each case pins it via its own
# `loadsmith.image` key (a per-case engine-image override the runner already
# supports) — no special flag needed:
#   loadsmith-lab run --select oracle-lab/oracle-to-jsonl
#
# This origin ships only cases — the lab-oracle DB image stays in the canonical
# images origin (it is a generic database fixture, like lab-postgres/lab-mysql).

[cases]
oracle-to-jsonl               = "Reads 100k rows from Oracle and writes them to JSONL (content/type smoke test)"
oracle-to-jsonl-tls           = "Reads 100k rows from Oracle over TCPS (wallet-verified) — native ODPI-C TLS"
oracle-to-jsonl-incremental   = "Incremental watermark read (cursor event_sequence > 50000) — reads the upper 50k"
oracle-to-oracle              = "Loads 100k rows into Oracle (atomic mode) — destination smoke test"
oracle-to-oracle-staged-merge = "Loads 100k rows into Oracle via staged_merge (MERGE upsert by id)"
oracle-to-oracle-lob          = "Round-trips RAW/BLOB/CLOB columns Oracle→Oracle — binary/LOB type coverage"
oracle-to-oracle-nls          = "Loads under a comma-decimal NLS (NLS_LANG) — proves NUMBER round-trip is NLS-safe"
