case:
  name: oracle-to-jsonl-incremental
  description: >
    Incremental (watermark) read: only rows past a cursor value are pulled.
    The source uses incremental.cursor_column = event_sequence with an
    initial_value of 50000, so the connector builds a `WHERE event_sequence >
    50000 ORDER BY event_sequence` query and reads exactly the upper half of the
    100k seed (rows 50001..100000). Exercises the cursor predicate, the NLS-safe
    typed cast of the watermark, and case-insensitive cursor-column matching.
  tags: [oracle, jsonl, incremental, smoke]

services:
  - image: images/lab-oracle
    alias: oracle
    readiness:
      tcp: 1521
      timeout_seconds: 600
      oracle:
        service_name: FREEPDB1
        user: lab
        password: lab
        probe_query: "SELECT 1 FROM spacecraft_telemetry_events WHERE ROWNUM = 1"

# The Oracle plugin links the native ODPI-C client (libclntsh) at runtime, which
# the plain slim engine image lacks. Run the core from the delivery image, which
# bakes in the Instant Client and the Oracle source/destination plugins. Interim:
# retired when the pure-Rust oracle-rs driver can read multi-packet result sets.
loadsmith:
  image: ghcr.io/loadsmith-el/loadsmith-oracle-odpi:slim

pipeline:
  file: pipeline.yaml

expect:
  status: success
  rows_read: 50000
  rows_written: 50000
  output:
    file: events.jsonl
    row_count: 50000
