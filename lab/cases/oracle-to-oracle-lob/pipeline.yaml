pipeline:
  name: oracle-to-oracle-lob

source:
  type: oracle
  config:
    host: oracle
    port: 1521
    service_name: FREEPDB1
    user: lab
    password: lab
    query: "SELECT * FROM lob_roundtrip ORDER BY id"
    batch_size: 100

destination:
  type: oracle
  config:
    host: oracle
    port: 1521
    service_name: FREEPDB1
    user: lab
    password: lab
    target_table: lob_roundtrip_sink
    mode: atomic
