case:
  name: oracle-to-oracle
  description: >
    Loads 100k rows into Oracle (atomic INSERT into events_sink) — destination
    smoke test. Source and sink are tables in the same lab-oracle container.
  tags: [oracle, destination, smoke]

services:
  - image: images/lab-oracle
    alias: oracle
    readiness:
      tcp: 1521
      timeout_seconds: 600
      oracle:
        service_name: FREEPDB1
        user: lab
        password: lab
        probe_query: "SELECT 1 FROM spacecraft_telemetry_events WHERE ROWNUM = 1"

pipeline:
  file: pipeline.yaml

expect:
  status: success
  rows_read: 100000
  rows_written: 100000
