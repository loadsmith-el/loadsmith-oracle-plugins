case:
  name: oracle-to-oracle
  description: >
    Loads 100k rows into Oracle (atomic INSERT into events_sink) — destination
    smoke test. Source and sink are tables in the same lab-oracle container.
  tags: [oracle, destination, smoke]

services:
  - image: images/lab-oracle
    alias: oracle
    readiness:
      tcp: 1521
      timeout_seconds: 600
      oracle:
        service_name: FREEPDB1
        user: lab
        password: lab
        # Gate on the LAST object init.sql creates (the events_sink PK), not just
        # the seeded source table — the seed COMMIT becomes visible several
        # statements (index builds) before events_sink exists, so a source-only
        # probe races the destination table into existence.
        probe_query: "SELECT 1 FROM user_constraints WHERE constraint_name = 'PK_SINK'"

# The Oracle plugin links the native ODPI-C client (libclntsh) at runtime, which
# the plain slim engine image lacks. Run the core from the delivery image, which
# bakes in the Instant Client and the Oracle source/destination plugins. Interim:
# retired when the pure-Rust oracle-rs driver can read multi-packet result sets.
loadsmith:
  image: ghcr.io/loadsmith-el/loadsmith-oracle-odpi:slim

pipeline:
  file: pipeline.yaml

expect:
  status: success
  rows_read: 100000
  rows_written: 100000
