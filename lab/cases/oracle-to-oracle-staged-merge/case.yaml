case:
  name: oracle-to-oracle-staged-merge
  description: >
    Loads 100k rows into Oracle via staged_merge — an array `MERGE INTO … USING
    (SELECT … FROM dual) … WHEN MATCHED THEN UPDATE … WHEN NOT MATCHED THEN
    INSERT` upsert keyed by id. Exercises the idempotent upsert path against a
    real Oracle; asserts every row committed.
  tags: [oracle, destination, staged-merge, smoke]

services:
  - image: images/lab-oracle
    alias: oracle
    readiness:
      tcp: 1521
      timeout_seconds: 600
      oracle:
        service_name: FREEPDB1
        user: lab
        password: lab
        probe_query: "SELECT 1 FROM spacecraft_telemetry_events WHERE ROWNUM = 1"

pipeline:
  file: pipeline.yaml

expect:
  status: success
  rows_read: 100000
  rows_written: 100000
