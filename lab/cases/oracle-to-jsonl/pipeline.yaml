pipeline:
  name: oracle-to-jsonl-smoke

source:
  type: oracle
  config:
    host: oracle
    port: 1521
    service_name: FREEPDB1
    user: lab
    password: lab
    query: "SELECT * FROM spacecraft_telemetry_events ORDER BY event_sequence"
    batch_size: 2000

destination:
  type: jsonl
  config:
    path: /output/events.jsonl
