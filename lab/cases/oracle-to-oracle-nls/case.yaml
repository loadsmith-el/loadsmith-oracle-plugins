case:
  name: oracle-to-oracle-nls
  description: >
    Loads 100k rows Oracle→Oracle with the engine session forced to a
    comma-decimal locale (NLS_LANG=GERMAN_GERMANY.AL32UTF8). Numbers cross the
    connector as text, so a hostile NLS_NUMERIC_CHARACTERS is the classic way to
    corrupt NUMBER values; this case proves the read→write round-trip stays
    faithful under that locale. Decimal fidelity (reading_decimal) is checked
    out-of-band against the source (the harness asserts row counts only).
  tags: [oracle, destination, nls, smoke]

services:
  - image: images/lab-oracle
    alias: oracle
    readiness:
      tcp: 1521
      timeout_seconds: 600
      oracle:
        service_name: FREEPDB1
        user: lab
        password: lab
        # Gate on the events_sink PK (created late in init.sql), so the dest
        # table exists before the case connects.
        probe_query: "SELECT 1 FROM user_constraints WHERE constraint_name = 'PK_SINK'"

# The Oracle plugin links the native ODPI-C client (libclntsh) at runtime, which
# the plain slim engine image lacks. Run the core from the delivery image, which
# bakes in the Instant Client and the Oracle source/destination plugins. Interim:
# retired when the pure-Rust oracle-rs driver can read multi-packet result sets.
loadsmith:
  image: ghcr.io/loadsmith-el/loadsmith-oracle-odpi:slim
  # Force a comma-decimal client locale to stress the text↔NUMBER conversions.
  env:
    - NLS_LANG=GERMAN_GERMANY.AL32UTF8

pipeline:
  file: pipeline.yaml

expect:
  status: success
  rows_read: 100000
  rows_written: 100000
