name: Release Oracle plugin + image

# Tag `oracle-v<version>` (matching connector/Cargo.toml) to:
#   1. build the plugin binaries natively for amd64 + arm64,
#   2. publish a GitHub Release (archives + checksums + loadsmith-plugin.yaml)
#      and update index.json (so `loadsmith install oracle --index <this>` works),
#   3. build + push the multi-arch delivery image
#      ghcr.io/loadsmith-el/loadsmith-oracle-odpi (slim + Instant Client + plugin).
#
# NOTE: this workflow has not yet run in CI — validate on the first real tag.

on:
  push:
    tags: ["oracle-v*"]

env:
  PLUGIN_DIR: connector
  IMAGE: ghcr.io/loadsmith-el/loadsmith-oracle-odpi

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: parse
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag##*-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          python3 ci/release.py check "${PLUGIN_DIR}" "$tag"

  build:
    needs: meta
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - { runner: ubuntu-latest,    arch: amd64 }
          - { runner: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (native ${{ matrix.arch }})
        run: cargo build --release --manifest-path "${PLUGIN_DIR}/Cargo.toml"
      - name: Package
        id: pkg
        run: |
          version="${{ needs.meta.outputs.version }}"
          arch="${{ matrix.arch }}"
          tarball="oracle-${version}-linux-${arch}.tar.gz"
          mapfile -t bins < <(python3 ci/release.py bins "${PLUGIN_DIR}")
          tar -czf "$tarball" -C target/release "${bins[@]}"
          sha256sum "$tarball" > "${tarball}.sha256"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            ${{ steps.pkg.outputs.tarball }}
            ${{ steps.pkg.outputs.tarball }}.sha256
          retention-days: 1

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency: index-commit
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate published manifest
        run: |
          version="${{ needs.meta.outputs.version }}"
          python3 ci/release.py manifest "${PLUGIN_DIR}" "${GITHUB_REF_NAME}" \
            "dist/oracle-${version}-linux-amd64.tar.gz" \
            "dist/oracle-${version}-linux-arm64.tar.gz" \
            "dist/loadsmith-plugin.yaml"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.meta.outputs.version }}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "oracle v${version}" \
            --notes "Out-of-canon Oracle plugin (native ODPI-C) v${version} (linux amd64+arm64). Needs the Oracle Instant Client at runtime — install: \`loadsmith install oracle --index <this repo's index.json>\`, or use the \`${IMAGE}\` image." \
            dist/*.tar.gz dist/*.sha256 dist/loadsmith-plugin.yaml
      - name: Update index.json
        run: |
          version="${{ needs.meta.outputs.version }}"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/loadsmith-plugin.yaml"
          python3 ci/release.py index oracle "$version" "$url" index.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "index: oracle v${version}" || { echo "no index change"; exit 0; }
          git push origin HEAD:main

  image:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Stage per-arch plugin binaries into the image context
        run: |
          version="${{ needs.meta.outputs.version }}"
          for arch in amd64 arm64; do
            mkdir -p "bin/${arch}"
            tar -xzf "dist/oracle-${version}-linux-${arch}.tar.gz" -C "bin/${arch}"
          done
          ls -R bin
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:slim
            ${{ env.IMAGE }}:v${{ needs.meta.outputs.version }}-slim
            ${{ env.IMAGE }}:sha-${{ github.sha }}-slim
